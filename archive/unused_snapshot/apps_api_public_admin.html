<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DFK Defense Admin</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #0f1520; color: #e8eefc; }
    .card { background: #1a2333; border: 1px solid #2e3d58; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    input, button { padding: 10px; border-radius: 8px; border: 1px solid #44536b; }
    button { cursor: pointer; }
    table { width: 100%; border-collapse: collapse; }
    td, th { padding: 8px; border-bottom: 1px solid #2e3d58; text-align: left; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Admin Login</h2>
    <input id="email" placeholder="admin email" />
    <input id="password" placeholder="password" type="password" />
    <button id="loginBtn">Login</button>
    <div id="loginStatus"></div>
  </div>
  <div class="card">
    <h2>Pending Withdrawals</h2>
    <table>
      <thead><tr><th>ID</th><th>User</th><th>Amount</th><th>To</th><th>Action</th></tr></thead>
      <tbody id="withdrawals"></tbody>
    </table>
  </div>
  <script src="admin.js"></script>
</body>
</html>
